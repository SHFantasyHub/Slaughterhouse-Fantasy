let currentFmt='PPR',currentPos='ALL',searchQ='',sortCol='rank',sortDir='asc',expandedRow=null,currentPage=1;
const PER_PAGE=25;
function getVal(p,fmt){const k=fmtKey[fmt];return p[k]!==null?p[k]:null;}
function filtered(){return PLAYERS.filter(p=>{const v=getVal(p,currentFmt);if(currentFmt==='Devy'&&v===null)return false;if(currentPos!=='ALL'&&p.pos!==currentPos)return false;if(searchQ&&!p.name.toLowerCase().includes(searchQ.toLowerCase())&&!p.team.toLowerCase().includes(searchQ.toLowerCase()))return false;return true;});}
function sorted(arr){return[...arr].sort((a,b)=>{let av,bv;if(sortCol==='rank'||sortCol==='value'){av=getVal(a,currentFmt)||0;bv=getVal(b,currentFmt)||0;return sortDir==='asc'?bv-av:av-bv;}else if(sortCol==='age'){return sortDir==='asc'?a.age-b.age:b.age-a.age;}else if(sortCol==='name'){return sortDir==='asc'?a.name.localeCompare(b.name):b.name.localeCompare(a.name);}else if(sortCol==='pos'){return sortDir==='asc'?a.pos.localeCompare(b.pos):b.pos.localeCompare(a.pos);}else if(sortCol==='team'){return sortDir==='asc'?a.team.localeCompare(b.team):b.team.localeCompare(a.team);}else if(sortCol==='trend'){return sortDir==='asc'?b.trend-a.trend:a.trend-b.trend;}return 0;});}
function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2);}
function ageClass(age){if(age<=23)return'age-young';if(age<=27)return'age-mid';return'age-old';}
function trendHTML(t){if(t>0)return`<span class="trend-up">▲ ${t}</span>`;if(t<0)return`<span class="trend-dn">▼ ${Math.abs(t)}</span>`;return`<span class="trend-eq">—</span>`;}
function render(){const data=sorted(filtered());const total=data.length;const pages=Math.max(1,Math.ceil(total/PER_PAGE));if(currentPage>pages)currentPage=1;const slice=data.slice((currentPage-1)*PER_PAGE,currentPage*PER_PAGE);const maxVal=Math.max(...data.map(p=>getVal(p,currentFmt)||0));document.getElementById('countLabel').textContent=total;document.getElementById('fmtLabel').textContent=currentFmt;const tbody=document.getElementById('tableBody');tbody.innerHTML='';if(slice.length===0){const tr=document.createElement('tr');tr.className='empty-row';tr.innerHTML=`<td colspan="7">No players found</td>`;tbody.appendChild(tr);}slice.forEach((p,i)=>{const globalRank=(currentPage-1)*PER_PAGE+i+1;const val=getVal(p,currentFmt);const barW=maxVal>0?Math.round((val/maxVal)*100):0;const rankClass=globalRank<=3?'top3':'';const tr=document.createElement('tr');tr.dataset.idx=PLAYERS.indexOf(p);tr.innerHTML=`<td class="td-rank num ${rankClass}">${String(globalRank).padStart(2,'0')}</td><td><div class="player-cell"><div class="av">${initials(p.name)}</div><div><div class="pname">${p.name}</div><div class="pteam">${p.team}</div></div></div></td><td><span class="pos ${p.pos}">${p.pos}</span></td><td style="font-family:'Space Mono',monospace;font-size:11px;color:rgba(245,240,232,0.6)">${p.team}</td><td class="num age-cell ${ageClass(p.age)}">${p.age}</td><td class="num"><div class="val-cell"><div class="val-bar-wrap"><div class="val-bar" style="width:${barW}%"></div></div><span class="val-num">${val!==null?val.toFixed(1):'—'}</span></div></td><td class="num">${trendHTML(p.trend)}</td>`;tr.addEventListener('click',()=>{expandedRow=expandedRow===PLAYERS.indexOf(p)?null:PLAYERS.indexOf(p);render();});tbody.appendChild(tr);if(expandedRow===PLAYERS.indexOf(p)){tr.classList.add('expanded');const exTr=document.createElement('tr');exTr.className='expand-row';exTr.innerHTML=`<td colspan="7"><div class="expand-inner"><div class="expand-stat"><div class="expand-stat-label">SF Value</div><div class="expand-stat-val">${p.sf!==null?p.sf.toFixed(1):'—'}</div></div><div class="expand-stat"><div class="expand-stat-label">TE Prem</div><div class="expand-stat-val">${p.te!==null?p.te.toFixed(1):'—'}</div></div><div class="expand-stat"><div class="expand-stat-label">Age</div><div class="expand-stat-val">${p.age}<span> yrs</span></div></div><div class="expand-stat"><div class="expand-stat-label">Trend</div><div class="expand-stat-val">${p.trend>0?'+':''}${p.trend}</div></div><div class="expand-note" style="grid-column:span 4">"${p.note}"</div></div></td>`;tbody.insertBefore(exTr,tr.nextSibling);}});renderPagination(pages);updateSortHeaders();}
function renderPagination(pages){const pg=document.getElementById('pagination');pg.innerHTML='';if(pages<=1)return;const prev=document.createElement('button');prev.className='pg-btn';prev.textContent='← Prev';prev.disabled=currentPage===1;prev.onclick=()=>{currentPage--;render();};pg.appendChild(prev);for(let i=1;i<=pages;i++){const b=document.createElement('button');b.className='pg-btn'+(i===currentPage?' active':'');b.textContent=i;b.onclick=()=>{currentPage=i;expandedRow=null;render();};pg.appendChild(b);}const next=document.createElement('button');next.className='pg-btn';next.textContent='Next →';next.disabled=currentPage===pages;next.onclick=()=>{currentPage++;render();};pg.appendChild(next);}
function updateSortHeaders(){document.querySelectorAll('th[data-col]').forEach(th=>{th.classList.remove('sort-asc','sort-desc');if(th.dataset.col===sortCol)th.classList.add(sortDir==='asc'?'sort-asc':'sort-desc');});}
document.getElementById('formatTabs').addEventListener('click',e=>{const b=e.target.closest('.fmt-btn');if(!b)return;document.querySelectorAll('.fmt-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentFmt=b.dataset.fmt;currentPage=1;expandedRow=null;render();});
document.getElementById('posFilters').addEventListener('click',e=>{const b=e.target.closest('.pos-btn');if(!b)return;document.querySelectorAll('.pos-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');currentPos=b.dataset.pos;currentPage=1;expandedRow=null;render();});
document.getElementById('searchInput').addEventListener('input',e=>{searchQ=e.target.value;currentPage=1;expandedRow=null;render();});
document.querySelectorAll('th[data-col]').forEach(th=>{th.addEventListener('click',()=>{if(sortCol===th.dataset.col){sortDir=sortDir==='asc'?'desc':'asc';}else{sortCol=th.dataset.col;sortDir='asc';}expandedRow=null;render();});});
render();
</script>
</body>
</html>
